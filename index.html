<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典俄羅斯方塊 Tetris</title>
    <style>
        /* 網頁外觀設計 */
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            font-size: 28px;
            letter-spacing: 2px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        /* 遊戲主要區塊佈局 */
        .game-container {
            display: flex;
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* 主遊戲畫面畫布 */
        #tetris {
            border: 2px solid #444;
            background-color: #111;
        }

        /* 右側資訊面板 */
        .sidebar {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            justify-content:间;
            width: 120px;
        }

        .info-box {
            background-color: #1f1f1f;
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .info-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #ff007f;
        }

        #nextPiece {
            background-color: #111;
            border: 1px solid #444;
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }

        #start-btn {
            padding: 10px;
            background-color: #00f0ff;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #start-btn:hover {
            background-color: #ff007f;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>

    <div class="game-container">
        <canvas id="tetris" width="300" height="600"></canvas>

        <div class="sidebar">
            <div class="info-box">
                <div class="info-title">SCORE</div>
                <div id="score" class="info-value">0</div>
            </div>
            <div class="info-box">
                <div class="info-title">LEVEL</div>
                <div id="level" class="info-value">1</div>
            </div>
            <div class="info-box">
                <div class="info-title">NEXT</div>
                <canvas id="nextPiece" width="90" height="90"></canvas>
            </div>
            <button id="start-btn" onclick="startGame()">START</button>
            
            <div class="controls">
                <b>操作說明:</b><br>
                ← / → : 左右移動<br>
                ↑ : 旋轉方塊<br>
                ↓ : 加速下落<br>
                空白鍵 : 瞬間落地
            </div>
        </div>
    </div>

    <script>
        // --- 遊戲邏輯與核心程式碼 ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextPiece');
        const nextContext = nextCanvas.getContext('2d');

        // 將畫面放大，這樣我們可以用 1 代表一個方塊格子
        context.scale(30, 30);
        nextContext.scale(30, 30);

        // 方塊顏色矩陣
        const colors = [
            null,
            '#FF0D72', // T (粉紅)
            '#0DC2FF', // I (水藍)
            '#0DFF72', // Z (綠)
            '#F538FF', // S (紫)
            '#FF8E0D', // J (橘)
            '#FFE135', // L (黃)
            '#3877FF'  // O (藍)
        ];

        // 建立遊戲地圖矩陣 (10寬 x 20高)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // 創造七種不同的方塊形狀
        function createPiece(type) {
            if (type === 'T') {
                return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            } else if (type === 'I') {
                return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
            } else if (type === 'Z') {
                return [[3, 3, 0], [0, 3, 3], [0, 0, 0]];
            } else if (type === 'S') {
                return [[0, 4, 4], [4, 4, 0], [0, 0, 0]];
            } else if (type === 'J') {
                return [[0, 5, 0], [0, 5, 0], [5, 5, 0]];
            } else if (type === 'L') {
                return [[0, 6, 0], [0, 6, 0], [0, 6, 6]];
            } else if (type === 'O') {
                return [[7, 7], [7, 7]];
            }
        }

        // 繪製方塊與地圖
        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // 加個細黑邊讓方塊更好看
                        ctx.strokeStyle = '#111';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        // 重新繪製整個遊戲畫面
        function draw() {
            context.fillStyle = '#111';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // 畫已經落底的地圖方塊
            drawMatrix(arena, {x: 0, y: 0}, context);
            // 畫玩家正在控制的方塊
            drawMatrix(player.matrix, player.pos, context);
            
            // 畫右上角的「下一顆方塊預覽」
            nextContext.fillStyle = '#111';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            // 居中靠左一點顯示預覽
            drawMatrix(player.next, {x: 0.5, y: 0.5}, nextContext);
        }

        // 碰撞偵測機制
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 將落底的方塊合併到地圖矩陣中
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 旋轉方塊矩陣
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        // 消除滿行的邏輯與計分
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                rowCount *= 2;
                
                // 每到一定分數就升級並加快速度
                player.level = Math.floor(player.score / 100) + 1;
                dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
            }
        }

        // 方塊自然下落
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        // 瞬間落地 (空白鍵)
        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        // 玩家左右移動
        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        // 生成下一顆新方塊與判定 Game Over
        function playerReset() {
            const pieces = 'ILJZOST';
            if (player.next === null) {
                player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            } else {
                player.matrix = player.next;
            }
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            // 如果一剛開始就碰撞，代表滿了，遊戲結束
            if (collide(arena, player)) {
                alert('💥 遊戲結束！ 你的總得分是: ' + player.score);
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.level = 1;
                dropInterval = 1000;
                updateScore();
                gameOver = true;
            }
        }

        // 處理玩家旋轉，並加上撞牆時的簡單推回機制 (Wall Kick)
        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // 更新網頁上的分數文字
        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
        }

        // 遊戲時間主循環
        let dropCounter = 0;
        let dropInterval = 1000; // 初始一秒掉一格
        let lastTime = 0;
        let gameOver = true;

        function update(time = 0) {
            if (gameOver) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 監聽鍵盤事件
        document.addEventListener('keydown', event => {
            if (gameOver) return;
            
            if (event.keyCode === 37) {        // 左方向鍵
                playerMove(-1);
            } else if (event.keyCode === 39) { // 右方向鍵
                playerMove(1);
            } else if (event.keyCode === 40) { // 下方向鍵
                playerDrop();
            } else if (event.keyCode === 38) { // 上方向鍵 (旋轉)
                playerRotate(1);
            } else if (event.keyCode === 32) { // 空白鍵 (瞬間下落)
                playerHardDrop();
            }
        });

        // 玩家物件定義
        const arena = createMatrix(10, 20);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            next: null,
            score: 0,
            level: 1,
        };

        // 按下 START 按鈕觸發
        function startGame() {
            if (gameOver) {
                gameOver = false;
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.level = 1;
                player.next = null;
                dropInterval = 1000;
                playerReset();
                updateScore();
                lastTime = performance.now();
                update();
                document.getElementById('start-btn').innerText = "RESTART";
            } else {
                // 如果已經在玩，按按鈕就重開
                gameOver = true;
                setTimeout(startGame, 100);
            }
        }

        // 初始化畫面（先畫個黑底底色）
        context.fillStyle = '#111';
        context.fillRect(0, 0, canvas.width, canvas.height);
        nextContext.fillStyle = '#111';
        nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    </script>
</body>
</html>
